# 因子注册表

formula_factors:
  - name: zt_dt_ratio
    class: ZtDtRatioFactor
    module: src.factors.formula.zt_ratio
    description: "涨停/(涨停+跌停) — 市场级情绪因子"
    factor_type: market
    lookback_days: 1

  - name: consecutive_board
    class: ConsecutiveBoardFactor
    module: src.factors.formula.consecutive_board
    description: "连板数 — 接力情绪指标"
    factor_type: stock
    lookback_days: 1

  - name: main_flow_intensity
    class: MainFlowIntensityFactor
    module: src.factors.formula.main_flow_intensity
    description: "主力净流入/成交额 — 大资金参与强度"
    factor_type: stock
    lookback_days: 1

  - name: turnover_rank
    class: TurnoverRankFactor
    module: src.factors.formula.turnover_rank
    description: "换手率百分位排名 — 资金关注度"
    factor_type: stock
    lookback_days: 1

  - name: lhb_institution
    class: LhbInstitutionFactor
    module: src.factors.formula.lhb_institution
    description: "龙虎榜机构净买入额 — 专业资金信号"
    factor_type: stock
    lookback_days: 1

narrative_factors:
  - name: theme_lifecycle
    class: ThemeLifecycleFactor
    module: src.factors.narrative.theme_lifecycle
    description: "题材连续涨停天数→生命周期阶段分数"
    factor_type: stock
    lookback_days: 10

  - name: narrative_velocity
    class: NarrativeVelocityFactor
    module: src.factors.narrative.narrative_velocity
    description: "新闻数量3日变化率"
    factor_type: stock
    lookback_days: 5

  - name: theme_crowding
    class: ThemeCrowdingFactor
    module: src.factors.narrative.theme_crowding
    description: "题材涨停占比，拥挤度越高分数越低"
    factor_type: stock
    lookback_days: 5

  - name: leader_clarity
    class: LeaderClarityFactor
    module: src.factors.narrative.leader_clarity
    description: "龙头成交额/第二名成交额"
    factor_type: stock
    lookback_days: 1
