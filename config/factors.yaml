# 因子注册表

formula_factors:
  - name: zt_dt_ratio
    class: ZtDtRatio
    module: src.factors.formula.zt_ratio
    description: "涨停/(涨停+跌停) — 市场级情绪因子"
    factor_type: market
    lookback_days: 1

  - name: board_height
    class: BoardHeight
    module: src.factors.formula.board_height
    description: "连板高度加权分 — 市场级高度因子"
    factor_type: market
    lookback_days: 1

  - name: seal_success_rate
    class: SealSuccessRate
    module: src.factors.formula.seal_success
    description: "涨停/(涨停+炸板) — 封板质量因子"
    factor_type: market
    lookback_days: 1

  - name: turnover_quantile
    class: TurnoverQuantile
    module: src.factors.formula.turnover_quantile
    description: "换手率全市场分位数 — 个股级"
    factor_type: stock
    lookback_days: 20

  - name: fund_flow_diverge
    class: FundFlowDiverge
    module: src.factors.formula.fund_flow_diverge
    description: "超大单与大单方向背离 — 个股级"
    factor_type: stock
    lookback_days: 5

narrative_factors:
  - name: theme_lifecycle
    class: ThemeLifecycle
    module: src.factors.narrative.theme_lifecycle
    description: "题材连续涨停天数→生命周期阶段分数"
    factor_type: stock
    lookback_days: 10

  - name: narrative_velocity
    class: NarrativeVelocity
    module: src.factors.narrative.narrative_velocity
    description: "新闻数量3日变化率"
    factor_type: stock
    lookback_days: 5

  - name: theme_crowding
    class: ThemeCrowding
    module: src.factors.narrative.theme_crowding
    description: "题材涨停占比，拥挤度越高分数越低"
    factor_type: stock
    lookback_days: 5

  - name: leader_clarity
    class: LeaderClarity
    module: src.factors.narrative.leader_clarity
    description: "龙头成交额/第二名成交额"
    factor_type: stock
    lookback_days: 1
