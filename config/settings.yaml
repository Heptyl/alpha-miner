# Alpha Miner 配置

# 数据库
database:
  path: "data/alpha_miner.db"

# API Keys
api:
  anthropic:
    api_key: "YOUR_KEY_HERE"
    model: "claude-sonnet-4-20250514"

# 数据采集
collector:
  retry_count: 3
  retry_delay: 2  # seconds
  request_timeout: 30  # seconds

# 因子验收标准
acceptance:
  min_ic: 0.03
  min_icir: 0.5
  min_win_rate: 0.55
  min_pnl_ratio: 1.2

# 进化引擎
evolution:
  default_generations: 10
  default_population: 10
  sandbox_timeout: 60  # seconds
  max_correlation: 0.7

# IC追踪
ic_tracker:
  default_window: 20
  forward_days: 1
